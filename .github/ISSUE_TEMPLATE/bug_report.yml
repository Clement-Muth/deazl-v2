name: Bug report
description: Signaler un bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Merci de remplir ce formulaire pour nous aider à reproduire le bug.

  - type: dropdown
    id: platform
    attributes:
      label: Plateforme
      options:
        - iOS
        - Android
        - Web
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Que s'est-il passé ?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur...
        2. Cliquer sur...
        3. Observer...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version de l'app
      placeholder: ex. 1.0.0
