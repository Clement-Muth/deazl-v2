<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="90%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#E8571C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#E8571C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#E8571C" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#E8571C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottomLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8571C" stop-opacity="0"/>
      <stop offset="25%" stop-color="#E8571C" stop-opacity="1"/>
      <stop offset="60%" stop-color="#E8571C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E8571C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dotFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#222222"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="#0D0D0D"/>

  <!-- Dot grid texture -->
  <rect width="1200" height="280" fill="url(#dots)" opacity="0.6"/>

  <!-- Orange glows -->
  <rect width="1200" height="280" fill="url(#glow)"/>
  <rect width="1200" height="280" fill="url(#glow2)"/>

  <!-- Left accent bar -->
  <rect x="0" y="40" width="3" height="200" fill="#E8571C" rx="2" opacity="0.9"/>

  <!-- Bottom gradient line -->
  <rect x="0" y="277" width="1200" height="1.5" fill="url(#bottomLine)"/>

  <!-- Top subtle line -->
  <rect x="0" y="0" width="1200" height="1" fill="#1E1E1E"/>

  <!-- Version pill -->
  <rect x="80" y="58" width="72" height="22" rx="11" fill="#E8571C" fill-opacity="0.12"/>
  <rect x="80" y="58" width="72" height="22" rx="11" fill="none" stroke="#E8571C" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="116" y="73" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="600" fill="#E8571C" text-anchor="middle" letter-spacing="1.5">v1.0.0</text>

  <!-- "Deazl." wordmark -->
  <text x="77" y="178"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', Arial, sans-serif"
    font-size="108" font-weight="800" fill="#FFFFFF" letter-spacing="-5">Deazl<tspan fill="#E8571C">.</tspan></text>

  <!-- Tagline -->
  <text x="82" y="222"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', Arial, sans-serif"
    font-size="13.5" fill="#505050" letter-spacing="5.5" font-weight="500">PLANIFIE · GÉNÈRE · COMPARE</text>

  <!-- Right decorative element — stacked orange bars -->
  <rect x="1090" y="100" width="60" height="3" rx="1.5" fill="#E8571C" opacity="0.8"/>
  <rect x="1110" y="112" width="40" height="3" rx="1.5" fill="#E8571C" opacity="0.5"/>
  <rect x="1125" y="124" width="25" height="3" rx="1.5" fill="#E8571C" opacity="0.25"/>
</svg>
